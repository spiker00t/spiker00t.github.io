title: "spikeroot's blog"
description: "CTF writeups and some hacking stuff"
author:
  name: "spikeroot"
  url: "https://spiker00t.github.io"

baseurl: /

source: .
destination: ./_site
permalink: /:title
paginate: 3
paginate_path: /page/:num/

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

future: true
plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap

# Custom variables
owner : "spikeroot"
year : "2023"
